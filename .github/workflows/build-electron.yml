name: Build Spidey Pet Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: artifacts/electron-pet
        shell: pwsh
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json }
          npm install

      - name: Build app
        working-directory: artifacts/electron-pet
        shell: pwsh
        env:
          NODE_PATH: node_modules
        run: node node_modules/electron-vite/bin/electron-vite.js build

      - name: Package for Windows
        working-directory: artifacts/electron-pet
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm exec electron-builder -- --win --x64

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: spidey-pet-windows
          path: artifacts/electron-pet/release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: artifacts/electron-pet
        run: |
          rm -f package-lock.json
          npm install

      - name: Build app
        working-directory: artifacts/electron-pet
        env:
          NODE_PATH: node_modules
        run: node node_modules/electron-vite/bin/electron-vite.js build

      - name: Package for macOS
        working-directory: artifacts/electron-pet
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm exec electron-builder -- --mac --x64 --arm64

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: spidey-pet-mac
          path: artifacts/electron-pet/release/*.dmg

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: spidey-pet-windows
          path: release/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: spidey-pet-mac
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Spidey Pet ${{ github.ref_name }}
          body: |
            ## Spidey Pet ${{ github.ref_name }}

            Your virtual tarantula desktop pet. Neglect her and she eats your screen.

            ### Download
            - **Windows**: Download the `.exe` file — run it to install
            - **macOS**: Download the `.dmg` file — drag to Applications

            ### What's new
            - Full desktop overlay mode — she roams across your entire screen
            - 7-stat AI: hunger, happiness, health, cleanliness, energy, trust, boredom
            - 6 personality types that shape her behaviour
            - 4 growth stages: baby → juvenile → adult → giant
            - New behaviours: follow mouse, flee mouse, corner hide, web-spin, jump scare, rage mode, disappear
            - New screen effects: scratch marks, smudges, debris particles, footprint trails, spider webs
            - Toy system: ball, stick, bug, rock, water bowl
            - 5 food types: kibble, cricket, moth, roach, fly
            - Tray menu: feed, toys, sleep, play, reset damage, chaos level, pet size controls

            ### First run on macOS
            If macOS blocks the app: System Settings → Privacy & Security → "Open Anyway"
          files: release/*
          draft: false
          prerelease: false
